<head>
  <title>About Me</title>

  <style>
    body {
      text-align: center;
      margin-top: 100px;
      font-family: Arial;
    }

    .typing {
      font-size: 28px;
      font-weight: bold;
      color: #6a5acd;
      border-right: 3px solid #6a5acd;
      padding-right: 5px;
      white-space: nowrap;
      overflow: hidden;
      animation: blink 0.7s infinite;
    }

    @keyframes blink {
      50% { border-color: transparent; }
    }
  </style>
</head>

<body>

<h1>Hello, I'm Apoorv 👋</h1>
<h2><span class="typing"></span></h2>

<script>
  const texts = [
    "Welocme 🥳 ",
    "To my portfolio 🥳🥳 ",
    "Also visit to my more websites 🥳🥳🥳 ",
    "Thanks for reaching out !!🥳🥳🥳🥳 "
  ];

  let count = 0;
  let index = 0;
  let currentText = "";
  let letter = "";

  function type() {
    if (count === texts.length) {
      count = 0;
    }

    currentText = texts[count];
    letter = currentText.slice(0, ++index);

    document.querySelector(".typing").textContent = letter;

    if (letter.length === currentText.length) {
      setTimeout(erase, 1200);
    } else {
      setTimeout(type, 100);
    }
  }

  function erase() {
    letter = currentText.slice(0, --index);
    document.querySelector(".typing").textContent = letter;

    if (letter.length === 0) {
      count++;
      setTimeout(type, 300);
    } else {
      setTimeout(erase, 60);
    }
  }

  document.addEventListener("DOMContentLoaded", function() {
    type();
  });
</script>
</body>
